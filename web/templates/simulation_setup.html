<!DOCTYPE html>
<html lang="cs"><head><meta charset="utf-8">
<title>Auction Sim — Nová simulace</title>
<style>
 body{font-family:system-ui,sans-serif;max-width:760px;margin:2rem auto;padding:0 1rem}
 h1{border-bottom:2px solid #eee;padding-bottom:.3rem}
 label{display:block;margin:.6rem 0 .2rem;font-weight:600;font-size:.9rem}
 input,select{padding:.4rem;width:100%;box-sizing:border-box}
 fieldset{margin:1rem 0;border:1px solid #ddd;border-radius:6px}
 .row{display:flex;gap:1rem}.row>div{flex:1}
 button{margin-top:1rem;padding:.6rem 1.2rem;background:#2563eb;color:#fff;border:0;border-radius:6px;cursor:pointer}
 .roles label{font-weight:400}
</style></head><body>
<h1>Aukční simulace</h1>
<form id="f">
 <fieldset><legend>Zboží</legend>
  <label>Název</label><input name="item_name" value="iPhone 15 Pro">
  <div class="row">
   <div><label>Retail cena (Kč)</label><input type="number" name="retail" value="25000"></div>
   <div><label>Kategorie</label><input name="category" value="elektronika"></div>
  </div>
 </fieldset>

 <fieldset><legend>Bidder pool (počet na roli)</legend><div class="roles row" style="flex-wrap:wrap">
  <div><label>Gambler</label><input type="number" name="GAMBLER" value="3"></div>
  <div><label>Cautious</label><input type="number" name="CAUTIOUS" value="2"></div>
  <div><label>Interested</label><input type="number" name="INTERESTED" value="2"></div>
  <div><label>Reseller</label><input type="number" name="RESELLER" value="1"></div>
  <div><label>Collector</label><input type="number" name="COLLECTOR" value="1"></div>
  <div><label>Sniper</label><input type="number" name="SNIPER" value="1"></div>
  <div><label>Social</label><input type="number" name="SOCIAL" value="1"></div>
 </div></fieldset>

 <fieldset><legend>Typy aukcí</legend><div class="roles">
  <label><input type="checkbox" name="t_DUTCH" checked> Dutch</label>
  <label><input type="checkbox" name="t_VICKREY" checked> Vickrey</label>
  <label><input type="checkbox" name="t_PENNY" checked> Penny</label>
  <label>Běhů na typ</label><input type="number" name="runs" value="1">
 </div></fieldset>

 <fieldset><legend>Virální mechanismy</legend><div class="roles">
  <label><input type="checkbox" name="v_entry_credit"> Entry credit</label>
  <label><input type="checkbox" name="v_social_proof" checked> Social proof</label>
  <label><input type="checkbox" name="v_countdown_extension" checked> Countdown extension</label>
  <label><input type="checkbox" name="v_buy_it_now"> Buy it now</label>
  <label><input type="checkbox" name="v_referral_bonus"> Referral bonus</label>
  <label><input type="checkbox" name="v_streak_bonus"> Streak bonus</label>
 </div></fieldset>

 <button type="submit">Spustit simulaci</button>
</form>

<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const retail = parseFloat(fd.get('retail'));
  const roles = ['GAMBLER','CAUTIOUS','INTERESTED','RESELLER','COLLECTOR','SNIPER','SOCIAL'];
  const pool = roles.map(r => ({role:r, count:parseInt(fd.get(r)||0)})).filter(p=>p.count>0);
  const types = ['DUTCH','VICKREY','PENNY'].filter(t => fd.get('t_'+t));
  const mech = ['entry_credit','social_proof','countdown_extension','buy_it_now','referral_bonus','streak_bonus']
    .filter(m => fd.get('v_'+m));
  const body = {
    name: fd.get('item_name')+' — '+types.join('/'),
    item: {name: fd.get('item_name'), retail_price: retail, quantity:1, category: fd.get('category')},
    bidder_pool: pool,
    auction_types: types,
    auction_params: {
      DUTCH:   {start_price: retail*1.2, reserve_price: retail*0.4, decrement: retail*0.03, tick_interval: 4e9, platform_fee_pct:5, max_ticks:40},
      VICKREY: {start_price: retail*0.3, reserve_price: retail*0.3, submission_window: 30e9, platform_fee_pct:5},
      PENNY:   {start_price: 1, bid_fee: 5, price_increment: 1, timer_reset: 10e9, tick_interval: 1e9, platform_fee_pct:10, max_ticks:300}
    },
    viral_config: {mechanisms: mech, entry_credit_amount:5, referral_pct:10, social_proof_threshold:3,
      countdown_extend_s: 5e9, countdown_trigger_s: 5e9, buy_now_multiplier:1.3, streak_discount_pct:5, streak_threshold:2},
    runs_per_type: parseInt(fd.get('runs')||1)
  };
  const res = await fetch('/api/v1/simulations', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const data = await res.json();
  if (data.simulation_id) window.location = '/simulations/'+data.simulation_id;
  else alert(JSON.stringify(data));
});
</script>
</body></html>
